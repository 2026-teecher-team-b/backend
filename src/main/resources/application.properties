spring.application.name=backend

# schema.sql 매 시작 시 실행 (IF NOT EXISTS 로 멱등성 보장)
spring.sql.init.mode=always

# Hibernate DDL 실행 후 schema.sql 실행
spring.jpa.defer-datasource-initialization=true
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/gitgalaxy
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=${SCOPE}
# ─── GitHub Doc Collector ───────────────────────────────
# GITHUB_TOKEN 환경변수로 주입 (미설정 시 batch job skip)
github.collector.token=${GITHUB_TOKEN}

# repo 목록 파일 경로 (프로젝트 루트 기준, .json 또는 .csv)
github.collector.repo-list-path=repos.json

# JSONL 출력 디렉토리
github.collector.output-dir=output

# 이미 수집된 repo skip
github.collector.skip-existing=true

# 재시도 횟수 / 첫 대기시간(ms) → exponential backoff
github.collector.max-retries=3
github.collector.retry-delay-ms=1000

# cron 표현식 (Spring 형식: 초 분 시 일 월 요일)
# 0 0 * * * *     → 매 시각 정각 (1시간마다)
# 0 0 9 * * *     → 매일 오전 9시
# 0 0 */6 * * *   → 6시간마다

github.collector.cron-expression=0 0 * * * *

# ─── GH Archive ──────────────────────────────────────
gharchive.base-url=https://data.gharchive.org
# WatchEvent 이 값 이상인 repo는 신규 후보로 등록
gharchive.min-watch-count-for-discovery=50
# 매 시각 10분 후 (GH Archive 업로드 대기 후 실행)
gharchive.cron-expression=0 10 * * * *

# ─── Trending RSS ─────────────────────────────────────
# 매일 06:00, 18:00
trending.rss.cron-expression=0 0 6,18 * * *




# Gemini (intro 요약). 비우면 요약 단계는 건너뜀
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash
gemini.embedding-model=text-embedding-004
gemini.max-retries=5
gemini.retry-delay-ms=2000

